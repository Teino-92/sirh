services:
  # ── Production ────────────────────────────────────────────────────────────────
  - type: web
    name: izi-rh
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: true
      - key: RAILS_LOG_TO_STDOUT
        value: true
      - key: WEB_CONCURRENCY
        value: 2
      - key: RAILS_MAX_THREADS
        value: 5
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: izi-rh-db
          property: connectionString

  # ── Staging ───────────────────────────────────────────────────────────────────
  - type: web
    name: izi-rh-staging
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build-staging.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: RAILS_ENV
        value: staging
      - key: RAILS_SERVE_STATIC_FILES
        value: true
      - key: RAILS_LOG_TO_STDOUT
        value: true
      - key: WEB_CONCURRENCY
        value: 1
      - key: RAILS_MAX_THREADS
        value: 3
      - key: RAILS_MASTER_KEY
        sync: false
      - key: APP_HOST
        sync: false
      - key: STAGING_LOGIN
        sync: false
      - key: STAGING_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: izi-rh-staging-db
          property: connectionString

databases:
  # ── Production DB ─────────────────────────────────────────────────────────────
  - name: izi-rh-db
    plan: free
    databaseName: izi_rh_production
    user: izi_rh

  # ── Staging DB ────────────────────────────────────────────────────────────────
  - name: izi-rh-staging-db
    plan: free
    databaseName: izi_rh_staging
    user: izi_rh_staging
